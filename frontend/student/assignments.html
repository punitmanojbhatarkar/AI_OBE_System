<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments | OBE System – MITAOE</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css?v=6">
  <link rel="stylesheet" href="../styles/components.css?v=6">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">OBE</div><div><div class="logo-text">OBE System</div><div class="logo-sub">MITAOE</div></div></div>
    <nav class="sidebar-nav">
      <p class="nav-section-label">My Learning</p>
      <a class="nav-item" href="dashboard.html">📊 My Dashboard</a>
      <a class="nav-item" href="assignments.html">📝 Assignments</a>
      <a class="nav-item" href="feedback.html">💬 Course Feedback</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card"><div class="user-avatar"></div><div><div class="user-name"></div><div class="user-role"></div></div></div>
      <button class="btn btn-ghost btn-sm w-full" data-action="logout" style="margin-top:8px">🚪 Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left"><h1 class="topbar-title">📝 My Assignments</h1></div>
      <div class="topbar-right">
        <select class="form-control" id="course-select" style="width:280px"><option value="">— Select Course —</option></select>
      </div>
    </header>
    <div class="page-content">
      <div id="assign-container"></div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<div id="submit-modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title" id="submit-title">Submit Assignment</h3><button class="modal-close" onclick="closeSubmitModal()">✕</button></div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Enter your answer/solution below. In Phase 2, you'll be able to upload PDF files.</p>
    <textarea class="form-control" id="submit-text" rows="10" placeholder="Type your submission here..."></textarea>
    <input type="hidden" id="submit-asgn-id">
    <div class="modal-footer" style="margin-top:12px">
      <button class="btn btn-secondary" onclick="closeSubmitModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAssignment()">📤 Submit</button>
    </div>
  </div>
</div>
<script src="../scripts/data.js?v=2"></script>`r`n<script src="../scripts/api.js"></script>
<script src="../scripts/auth.js?v=2"></script>
<script src="../scripts/utils.js"></script>
<script>
(async () => {
  await (window._apiReady || Promise.resolve());
  const user = Auth.requireAuth(['student']);
if(!user) throw 0;
Auth.populateSidebar(user);

const myEnrollments = DB.students.all().filter(s=>s.prn===user.prn);
const myCourseIds = [...new Set(myEnrollments.map(s=>s.courseId))];
const sel = document.getElementById('course-select');
myCourseIds.forEach(cid=>{const c=DB.courses.byId(cid);if(c){const o=document.createElement('option');o.value=c.id;o.textContent=`${c.code} – ${c.name}`;sel.appendChild(o);}});
if(myCourseIds.length){sel.value=myCourseIds[0];loadAssignments(myCourseIds[0]);}
sel.addEventListener('change',e=>{if(e.target.value)loadAssignments(e.target.value);});

function loadAssignments(cid){
  const container = document.getElementById('assign-container');
  const assigns = DB.assignments.byCourse(cid);
  if(!assigns.length){container.innerHTML='<div class="card"><div class="empty-state"><div class="empty-icon">📝</div><h3>No Assignments</h3><p>No assignments have been created for this course yet.</p></div></div>';return;}

  container.innerHTML='';
  assigns.forEach(a=>{
    const sub = DB.submissions.byAssignment(a.id).find(s=>s.prn===user.prn);
    const status = sub?(sub.gradedAt?'Graded':'Submitted'):'Pending';
    const stClass = {Graded:'badge-success',Submitted:'badge-info',Pending:'badge-warning'}[status];
    let card = `<div class="card mb-lg" style="position:relative">
      ${a.aiGenerated?'<div style="position:absolute;top:12px;right:12px;background:linear-gradient(135deg,#06b6d4,#2563EB);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px">AI Generated</div>':''}
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Assignment ${a.no}</div>
      <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">${a.title}</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">${a.description||''}</p>
      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary);margin-bottom:16px">
        <span>📅 Due: ${Fmt.date(a.dueDate)}</span>
        <span>📊 Max Marks: ${a.maxMarks}</span>
        <span>🎯 COs: ${(a.coNos||[]).map(n=>'CO'+n).join(', ')}</span>
        <span class="badge ${stClass}">${status}</span>
      </div>`;

    // Questions
    if(a.questions?.length){
      card+='<div style="margin-bottom:16px"><h4 style="font-size:14px;font-weight:700;margin-bottom:8px">Questions</h4>';
      a.questions.forEach(q=>{card+=`<div style="padding:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:13px"><strong>Q${q.qNo}.</strong> ${q.text} <span class="badge badge-info" style="font-size:10px">${q.marks} marks</span></div>`;});
      card+='</div>';
    }

    // Submit/view button
    if(!sub){
      card+=`<button class="btn btn-primary btn-sm" onclick="openSubmitModal('${a.id}','${a.title}')">📤 Submit Answer</button>`;
    } else if(sub.gradedAt){
      card+=`<div style="padding:14px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px">
        <div style="font-weight:700;color:var(--success);margin-bottom:4px">✅ Graded — ${sub.marks||'—'}/${a.maxMarks} (${sub.marks?Math.round((sub.marks/a.maxMarks)*100):'—'}%)</div>
        <div style="font-size:13px;color:var(--text-secondary)">${sub.feedback||'No feedback yet.'}</div></div>`;
    } else {
      card+=`<div style="padding:10px;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:8px;font-size:13px;color:var(--info)">✓ Submitted on ${Fmt.date(sub.submittedAt)}. Awaiting grading.</div>`;
    }
    card+='</div>';
    container.innerHTML+=card;
  });
}

function openSubmitModal(asgnId,title){
  document.getElementById('submit-title').textContent='Submit: '+title;
  document.getElementById('submit-asgn-id').value=asgnId;
  document.getElementById('submit-text').value='';
  document.getElementById('submit-modal').style.display='flex';
}
function closeSubmitModal(){document.getElementById('submit-modal').style.display='none';}
function submitAssignment(){
  const asgnId=document.getElementById('submit-asgn-id').value;
  const text=document.getElementById('submit-text').value.trim();
  if(!text){Toast.warning('Please enter your answer.');return;}
  DB.submissions.add({assignmentId:asgnId,prn:user.prn,text,marks:null,feedback:null,gradedAt:null});
  closeSubmitModal();
  loadAssignments(sel.value);
  Toast.success('Assignment submitted successfully!');
}
})();
</script>
<script src="../scripts/ai-chat.js"></script>\n</body>
</html>
